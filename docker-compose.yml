services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: future_media
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3167:3167"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/future_media
      JWT_SECRET: change-me-in-production
      JWT_EXPIRATION: 1h
      PORT: 3167
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: rebuild
          path: ./apps/api/package.json
        - action: rebuild
          path: ./pnpm-lock.yaml

volumes:
  pgdata:
